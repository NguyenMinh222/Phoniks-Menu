<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <title>PHONIKS Menu</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero" id="siteHeader">
    <div class="hero__top" id="heroTop">
      <div>
        <p class="eyebrow">Born from fire</p>
        <h1>PHONIKS</h1>
        <p class="subtitle" data-i18n="subtitle">QR-меню вьетнамской кухни</p>
      </div>
      <button class="install-btn" id="installBtn" hidden>Установить</button>
    </div>

    <div class="language-switcher" id="languageSwitcher" aria-label="Language switcher">
      <button class="lang active" data-lang="ru">🇷🇺 Рус</button>
      <button class="lang" data-lang="en">🇬🇧 Eng</button>
      <button class="lang" data-lang="vn">🇻🇳 Việt</button>
      <button class="lang" data-lang="zh">🇨🇳 中文</button>
    </div>

    <div class="search-wrap" id="searchWrap">
      <input id="searchInput" type="search" placeholder="Поиск по меню" autocomplete="off" />
      <button class="search-close" id="searchClose" type="button" aria-label="Закрыть поиск">×</button>
    </div>

    <div class="category-row" id="categoryRow">
      <button class="search-toggle" id="searchToggle" type="button" aria-label="Открыть поиск">🔎</button>
      <nav class="chips" id="categoryChips" aria-label="Menu categories"></nav>
    </div>
  </header>

  <main id="menuStart">
    <section class="menu-grid" id="menuGrid"></section>
    <p class="empty" id="emptyState" hidden>Ничего не найдено</p>
  </main>

  <section class="qr-section">
    <div>
      <h2>QR MENU</h2>
      <p id="qrHint">Отсканируйте QR-код, чтобы открыть меню на телефоне</p>
    </div>
    <div id="qrCode" class="qr-code" aria-label="QR code"></div>
    <p class="qr-url" id="qrUrl"></p>
  </section>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox__close" id="closeLightbox">×</button>
    <img id="lightboxImg" alt="Dish photo large" />
    <p id="lightboxTitle"></p>
  </div>

  <template id="dishTemplate">
    <article class="dish-card">
      <button class="dish-image-btn" type="button">
        <img class="dish-image" alt="" loading="lazy" decoding="async" />
        <span class="photo-note" hidden></span>
      </button>
      <div class="dish-body">
        <div class="dish-head">
          <h3 class="dish-name"></h3>
        </div>
        <div class="dish-meta">
          <span class="dish-weight"></span>
          <strong class="dish-price"></strong>
        </div>
        <p class="dish-desc"></p>
        <div class="badges"></div>
      </div>
    </article>
  </template>

  <script src="menu-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
